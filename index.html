<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASEN ENTERPRISE LTD</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            font-family:Arial,sans-serif;
            background:#f9d22f;
            color:#000;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }
        h1{
            font-size:42px;
            font-weight:bold;
            margin-bottom:10px;
        }
        .subtitle{
            font-size:18px;
            margin-bottom:50px;
        }
        .arrow{
            width:40px;
            height:40px;
            border-right:4px solid #000;
            border-bottom:4px solid #000;
            transform:rotate(45deg);
            cursor:pointer;
            animation:bounce 1.5s infinite;
        }
        @keyframes bounce{
            0%,100%{transform:rotate(45deg) translate(0,0);}
            50%{transform:rotate(45deg) translate(10px,10px);}
        }
        a{text-decoration:none;}
    </style>
</head>
<body>
    <h1>DASEN ENTERPRISE LTD</h1>
    <p class="subtitle">Global Supplier of Nickel · Cobalt · Lithium</p>
    <a href="contact.html">
        <div class="arrow"></div>
    </a>
</body>
</html>
