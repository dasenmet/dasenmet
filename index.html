<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASEN ENTERPRISE LTD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 参考站同款黄色背景 */
            background: #f9d321;
            color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            /* 🔥 关键：和参考网站完全一样的字体 */
            font-family: Georgia, "Times New Roman", Times, serif;
        }

        /* 公司名称（和参考站字体、大小、间距完全一致） */
        h1 {
            font-size: 46px;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        /* 副标题（字体、大小、间距 1:1） */
        .subtitle {
            font-size: 19px;
            font-weight: normal;
            letter-spacing: 0.5px;
            margin-bottom: 60px;
        }

        /* 下滑箭头（和参考站同款样式 + 动画） */
        .arrow {
            width: 26px;
            height: 26px;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(10px); }
            100% { transform: rotate(45deg) translateY(0); }
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>DASEN ENTERPRISE LTD</h1>
    <p class="subtitle">Global Partner for Secure, Sustainable & Responsible Supply of Energy Materials</p>
    <a href="contact.html">
        <div class="arrow"></div>
    </a>
</body>
</html>
