<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasen Enterprise Ltd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #F8EDB3;
            color: #000000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Helvetica, Arial, sans-serif;
        }
        .brand-title {
            font-size: 6vw;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 24px;
        }
        .brand-slogan {
            font-size: 1.2vw;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 80px;
            text-align: center;
        }
        .scroll-down {
            width: 40px;
            height: 40px;
            border: 1.5px solid #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .scroll-down:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .scroll-down::after {
            content: "↓";
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1 class="brand-title">Dasen Enterprise Ltd</h1>
    <p class="brand-slogan">Leaders in importing & trading battery raw materials worldwide</p>
    <div class="scroll-down" onclick="window.location.href='contact.html'"></div>

    <script>
        document.addEventListener('wheel', function(e) {
            if (e.deltaY > 50) {
                window.location.href = 'contact.html';
            }
        });
    </script>
</body>
</html>
