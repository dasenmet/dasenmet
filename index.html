<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASEN ENTERPRISE LTD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 柔和浅黄底色 */
            background: #fff399;
            color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 公司名：大号加粗 */
        h1 {
            font-family: "TT Norms Pro", Arial, sans-serif;
            font-weight: 700;
            font-size: 60pt;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* 标语：小号常规 */
        .subtitle {
            font-family: "Proxima Nova", Arial, sans-serif;
            font-weight: 400;
            font-size: 20pt;
            max-width: 90%;
            margin-bottom: 70px;
            line-height: 1.4;
        }

        /* 下滑箭头 */
        .arrow {
            width: 26px;
            height: 26px;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            transform: rotate(45deg);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(10px); }
            100% { transform: rotate(45deg) translateY(0); }
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>DASEN ENTERPRISE LTD</h1>
    <p class="subtitle">Global Partner for Secure, Sustainable & Responsible Supply of Energy Materials</p>
    <a href="contact.html">
        <div class="arrow"></div>
    </a>
</body>
</html>
